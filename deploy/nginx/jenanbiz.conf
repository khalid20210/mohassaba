# ═══════════════════════════════════════════════════════════════════════════
#  Nginx Configuration — jenanbiz.com
#  Flask/Waitress Reverse Proxy + SSL/TLS (Let's Encrypt)
#  النسخة: 1.0 | Jenan Biz Platform
# ═══════════════════════════════════════════════════════════════════════════

# ── Rate Limiting ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=jenanbiz_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=jenanbiz_login:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=jenanbiz_api:10m     rate=60r/m;

# ── إعادة توجيه HTTP → HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name jenanbiz.com www.jenanbiz.com;

    # تحدي Let's Encrypt (أبقِه قبل إعادة التوجيه)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://jenanbiz.com$request_uri;
    }
}

# ── تحويل www → non-www ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jenanbiz.com;

    ssl_certificate     /etc/letsencrypt/live/jenanbiz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenanbiz.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://jenanbiz.com$request_uri;
}

# ── الخادم الرئيسي HTTPS ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jenanbiz.com;

    # ── شهادة SSL (Let's Encrypt / Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/jenanbiz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenanbiz.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── أمان TLS محسّن ──────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── HSTS (Strict Transport Security) ───────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security Headers ────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src 'self' fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;

    # ── الحجم الأقصى للطلب (مهم لرفع الملفات) ──────────────────────────
    client_max_body_size 50M;

    # ── سجلات الوصول والأخطاء ──────────────────────────────────────────
    access_log /var/log/nginx/jenanbiz_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/jenanbiz_error.log warn;

    # ── الملفات الثابتة (Static Files) — يخدمها nginx مباشرة ───────────
    location /static/ {
        alias /opt/jenanbiz/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        gzip_static on;
        access_log off;
    }

    # ── PWA Manifest & Service Worker ──────────────────────────────────
    location = /static/manifest.json {
        alias /opt/jenanbiz/static/manifest.json;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location = /static/sw.js {
        alias /opt/jenanbiz/static/sw.js;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # ── Favicon ────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /opt/jenanbiz/static/icons/favicon.ico;
        expires 7d;
        access_log off;
    }

    # ── صفحة الصيانة (فعّلها عند الترقية) ─────────────────────────────
    # location / {
    #     return 503;
    # }
    # error_page 503 /maintenance.html;
    # location = /maintenance.html {
    #     root /var/www/html;
    #     internal;
    # }

    # ── Health Check (بدون Rate Limit) ─────────────────────────────────
    location = /healthz {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        access_log off;
    }

    location = /readyz {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Rate Limit — تسجيل الدخول ──────────────────────────────────────
    location ~ ^/(auth/login|auth/register|auth/reset-password) {
        limit_req zone=jenanbiz_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        include            /etc/nginx/proxy_params_jenanbiz;
    }

    # ── Rate Limit — API ────────────────────────────────────────────────
    location ~ ^/api/ {
        limit_req zone=jenanbiz_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        include            /etc/nginx/proxy_params_jenanbiz;
    }

    # ── الطلبات العامة ─────────────────────────────────────────────────
    location / {
        limit_req zone=jenanbiz_general burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        include            /etc/nginx/proxy_params_jenanbiz;
    }

    # ── صفحة 429 مخصصة ─────────────────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        root /var/www/html;
        internal;
    }
}
