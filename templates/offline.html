<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — نظام المحاسبة</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 400px;
      background: #1e293b;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #f1f5f9; }
    p  { color: #94a3b8; font-size: .95rem; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>
      أنت حالياً بدون اتصال.
      الصفحات المحفوظة متاحة للعرض، لكن العمليات الجديدة تتطلب اتصالاً.
    </p>
    <button onclick="location.reload()">🔄 إعادة المحاولة</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
