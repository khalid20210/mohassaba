<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenan Biz - لوحة مراقبة الأداء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .status-card h3 {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .status-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-ok { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-error { background: #f8d7da; color: #721c24; }

        .info-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .info-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .info-row:last-child { border-bottom: none; }
        .info-key { font-weight: 600; color: #666; }
        .info-value { color: #333; font-family: 'Courier New', monospace; }

        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 لوحة مراقبة Jenan Biz</h1>
        
        <div class="status-grid">
            <div class="status-card">
                <h3>حالة الخدمة</h3>
                <div class="status-value" id="health">--</div>
                <span class="status-badge" id="health-badge">جاري التحقق...</span>
            </div>
            <div class="status-card">
                <h3>جاهزية النظام</h3>
                <div class="status-value" id="ready">--</div>
                <span class="status-badge" id="ready-badge">جاري التحقق...</span>
            </div>
            <div class="status-card">
                <h3>سرعة DB</h3>
                <div class="status-value" id="db-ping">--</div>
                <span>ميلي ثانية</span>
            </div>
            <div class="status-card">
                <h3>عدد الطلبات</h3>
                <div class="status-value" id="req-count">--</div>
                <span>منذ البدء</span>
            </div>
        </div>

        <div class="info-section">
            <h2>معلومات المنصة</h2>
            <div class="info-row">
                <span class="info-key">المنطقة:</span>
                <span class="info-value" id="region">--</span>
            </div>
            <div class="info-row">
                <span class="info-key">البيئة:</span>
                <span class="info-value" id="env">--</span>
            </div>
            <div class="info-row">
                <span class="info-key">آخر تحديث:</span>
                <span class="info-value" id="last-update">الآن</span>
            </div>
        </div>

        <div class="refresh-info">
            ⚡ تحديث تلقائي كل 5 ثوان | الإصدار: v2.0
        </div>
    </div>

    <script>
        async function updateStatus() {
            try {
                // /healthz
                const healthRes = await fetch('/healthz');
                const health = await healthRes.json();
                document.getElementById('health').textContent = health.status === 'ok' ? '✓ سليم' : '✗ خطأ';
                document.getElementById('health-badge').className = health.status === 'ok' ? 'status-badge badge-ok' : 'status-badge badge-error';
                document.getElementById('region').textContent = health.region || '--';
                document.getElementById('env').textContent = health.env || '--';
            } catch (e) {
                document.getElementById('health').textContent = '✗';
                document.getElementById('health-badge').className = 'status-badge badge-error';
                document.getElementById('health-badge').textContent = 'خطأ الاتصال';
            }

            try {
                // /readyz
                const readyRes = await fetch('/readyz');
                const ready = await readyRes.json();
                const isReady = readyRes.status === 200;
                document.getElementById('ready').textContent = isReady ? '✓ جاهز' : '⚠ متدهور';
                document.getElementById('ready-badge').className = isReady ? 'status-badge badge-ok' : 'status-badge badge-warning';
                
                if (ready.ping_ms) {
                    document.getElementById('db-ping').textContent = Math.round(ready.ping_ms);
                }
            } catch (e) {
                document.getElementById('ready').textContent = '✗';
                document.getElementById('ready-badge').className = 'status-badge badge-error';
                document.getElementById('ready-badge').textContent = 'خطأ الاتصال';
            }

            // تحديث الوقت
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString('ar');
        }

        // تحديث فوري عند التحميل
        updateStatus();

        // تحديث دوري كل 5 ثوان
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
