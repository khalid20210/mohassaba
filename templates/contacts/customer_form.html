{% extends "base.html" %}
{% block title %}عميل جديد{% endblock %}
{% block page_title %}👤 إضافة عميل{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="/contacts/customers" style="color:#94a3b8;font-size:.85rem;">← قائمة العملاء</a>
    <h1 class="page-title" style="margin-top:4px;">إضافة عميل جديد</h1>
  </div>
</div>

<div class="card" style="max-width:600px;margin:0 auto;">
  <form action="/contacts/customers/new" method="post">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="grid-column:1/-1;">
        <label class="form-label">الاسم الكامل *</label>
        <input type="text" name="name" class="form-input" required placeholder="اسم العميل">
      </div>
      <div>
        <label class="form-label">الهاتف</label>
        <input type="text" name="phone" class="form-input" placeholder="05xxxxxxxx">
      </div>
      <div>
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" name="email" class="form-input" placeholder="email@example.com">
      </div>
      <div style="grid-column:1/-1;">
        <label class="form-label">العنوان</label>
        <input type="text" name="address" class="form-input" placeholder="المدينة، الحي، الشارع">
      </div>
      <div>
        <label class="form-label">نوع العميل</label>
        <select name="contact_type" class="form-input">
          <option value="retail">تجزئة</option>
          <option value="wholesale">جملة</option>
          <option value="vip">VIP</option>
        </select>
      </div>
      <div>
        <label class="form-label">حد الائتمان (ر.س)</label>
        <input type="number" name="credit_limit" class="form-input" value="0" min="0" step="0.01">
      </div>
      <div>
        <label class="form-label">الرقم الضريبي</label>
        <input type="text" name="tax_number" class="form-input" placeholder="اختياري">
      </div>
      <div>
        <label class="form-label">رقم السجل التجاري</label>
        <input type="text" name="commercial_reg" class="form-input" placeholder="اختياري">
      </div>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary">💾 حفظ</button>
      <a href="/contacts/customers" class="btn btn-secondary">إلغاء</a>
    </div>
  </form>
</div>
{% endblock %}
