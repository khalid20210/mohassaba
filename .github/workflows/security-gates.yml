name: Security Gates

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sast_bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit bandit-sarif-formatter
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bandit (high confidence, high severity)
        run: |
          mkdir -p artifacts
          bandit -r app.py modules \
            -f json \
            -o artifacts/bandit.json \
            -iii -lll
          bandit -r app.py modules \
            -f sarif \
            -o artifacts/bandit.sarif \
            -iii -lll

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/bandit.sarif

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report-${{ github.run_id }}
          path: artifacts/bandit.json
          if-no-files-found: warn

  deps_pip_audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip-audit
        run: |
          mkdir -p artifacts
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output artifacts/pip-audit.json
          else
            echo "requirements.txt not found" > artifacts/pip-audit.json
            exit 1
          fi

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: artifacts/pip-audit.json
          if-no-files-found: warn

  secret_scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_CONFIG: .gitleaks.toml
