name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.1'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare virtual environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt pyinstaller

      - name: Build release artifacts
        shell: pwsh
        env:
          JENAN_SIGN_CERT_BASE64: ${{ secrets.JENAN_SIGN_CERT_BASE64 }}
          JENAN_SIGN_CERT_PASSWORD: ${{ secrets.JENAN_SIGN_CERT_PASSWORD }}
        run: |
          $version = if ('${{ github.event.inputs.version }}') { '${{ github.event.inputs.version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          if ($env:JENAN_SIGN_CERT_BASE64) {
            $certDir = '.\\.ci-certs'
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
            $certPath = Join-Path $certDir 'JenanBiz-CodeSign.pfx'
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:JENAN_SIGN_CERT_BASE64))
            $env:JENAN_SIGN_CERT_PATH = (Resolve-Path $certPath).Path
          }
          powershell -ExecutionPolicy Bypass -File .\packaging\windows\build_windows_release.ps1 -Version $version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jenanbiz-windows-release
          path: |
            dist/setup/*
            dist/installer/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/setup/*
            dist/installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
